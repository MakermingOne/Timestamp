<?xml version="1.0" encoding="UTF-8"?>
<svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="400" fill="#1677FF"/>
  <rect x="10" y="10" width="280" height="380" fill="white" stroke="#1677FF" stroke-width="4" rx="8"/>
  
  <!-- 标题 -->
  <text x="150" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1677FF">支付宝</text>
  
  <!-- QR码占位区域 -->
  <rect x="50" y="80" width="200" height="200" fill="#f0f0f0" stroke="#1677FF" stroke-width="2" rx="4"/>
  
  <!-- 模拟 QR 码图案 -->
  <g fill="#1677FF">
    <!-- 左上角定位图案 -->
    <rect x="70" y="100" width="40" height="40"/>
    <rect x="80" y="110" width="20" height="20" fill="#f0f0f0"/>
    <rect x="85" y="115" width="10" height="10"/>
    
    <!-- 右上角定位图案 -->
    <rect x="190" y="100" width="40" height="40"/>
    <rect x="200" y="110" width="20" height="20" fill="#f0f0f0"/>
    <rect x="205" y="115" width="10" height="10"/>
    
    <!-- 左下角定位图案 -->
    <rect x="70" y="220" width="40" height="40"/>
    <rect x="80" y="230" width="20" height="20" fill="#f0f0f0"/>
    <rect x="85" y="235" width="10" height="10"/>
    
    <!-- 随机小方块模拟数据 -->
    <rect x="120" y="100" width="10" height="10"/>
    <rect x="140" y="110" width="10" height="10"/>
    <rect x="160" y="100" width="10" height="10"/>
    <rect x="120" y="130" width="10" height="10"/>
    <rect x="150" y="140" width="10" height="10"/>
    <rect x="170" y="130" width="10" height="10"/>
    <rect x="130" y="160" width="10" height="10"/>
    <rect x="160" y="170" width="10" height="10"/>
    <rect x="120" y="190" width="10" height="10"/>
    <rect x="150" y="200" width="10" height="10"/>
    <rect x="180" y="190" width="10" height="10"/>
    <rect x="140" y="220" width="10" height="10"/>
    <rect x="170" y="230" width="10" height="10"/>
  </g>
  
  <!-- 底部文字 -->
  <text x="150" y="340" font-family="Arial, sans-serif" font-size="14" text-anchor="middle" fill="#666">请替换为真实付款码</text>
  <text x="150" y="360" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#999">assets/alipay.png</text>
</svg>